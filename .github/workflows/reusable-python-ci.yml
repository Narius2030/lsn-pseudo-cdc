name: Reusable Python CI

on:
  workflow_call:
    inputs:
      python-versions:
        description: JSON array of Python versions to test
        type: string
        default: '["3.10", "3.11", "3.12"]'
      ref:
        description: Git ref (tag/branch/SHA) to check out
        type: string
        default: ''

jobs:
  quality:
    name: Python ${{ matrix.python }} quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python: ${{ fromJSON(inputs.python-versions) }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install package and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Run linting and formatting
        run: |
          ruff check .
          ruff format --check .

      - name: Run unit-tests
        run: python -m unittest discover -s tests -t . -v

      - name: Build distribution
        run: python -m build

      - name: Upload package artifacts
        if: matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: python-distribution
          path: dist/
          if-no-files-found: error

