name: CD

on:
  repository_dispatch:
    types: [release-created]
  workflow_dispatch:
    inputs:
      version:
        description: Published image version to pull (for example, 1.2.3)
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: read

jobs:
  prepare:
    name: Resolve requested image
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      image: ${{ steps.request.outputs.image }}
      version: ${{ steps.request.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: request
        env:
          DISPATCH_IMAGE: ${{ github.event.client_payload.image }}
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          chmod +x ./.github/scripts/cd/*.sh
          bash ./.github/scripts/cd/prepare.sh

  # This job only downloads a verified image into the Docker cache on the
  # target server. It deliberately does not create, restart, or remove any
  # containers; the server-owned runtime controls those operations.
  deploy-production:
    name: Pull image to production
    needs: prepare
    runs-on: ${{ fromJSON(vars.DEPLOY_RUNS_ON_STAGING || '["self-hosted"]') }}
    timeout-minutes: 15
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify deployment tools
        run: |
          docker version
          cosign version

      - name: Pull requested image by digest
        env:
          REQUESTED_IMAGE: ${{ needs.prepare.outputs.image }}
          VERSION: ${{ needs.prepare.outputs.version }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSIGN_CERT_IDENTITY_REGEXP: '^${{ github.server_url }}/${{ github.repository }}/.github/workflows/.+@.+$'
          COSIGN_CERT_OIDC_ISSUER: https://token.actions.githubusercontent.com
        run: |
          chmod +x ./.github/scripts/cd/*.sh
          bash ./.github/scripts/cd/pull-image.sh
